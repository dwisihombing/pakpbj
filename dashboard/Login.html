<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Login Dashboard</h2>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium">Username</label>
        <input type="text" id="username" class="w-full p-2 border rounded mt-1">
      </div>
      <div>
        <label class="block text-sm font-medium">Password</label>
        <input type="password" id="password" class="w-full p-2 border rounded mt-1">
      </div>
      <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
        Login
      </button>
      <p id="loginError" class="text-red-500 text-sm hidden text-center"></p>
    </div>
  </div>
</div>
