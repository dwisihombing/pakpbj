<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
  </head>
  <body>
    <script>
  // State sederhana
  let currentUser = null;

  // Jalankan saat pertama kali dibuka
  window.onload = function() {
    showLogin();
  };

  function showLogin() {
    google.script.run.withSuccessHandler(function(html) {
      document.getElementById('app').innerHTML = html;
    }).include('Login');
  }

  function handleLogin() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    
    btn.disabled = true;
    btn.innerText = "Checking...";

    google.script.run.withSuccessHandler(function(response) {
      if (response.success) {
        currentUser = response.user;
        loadDashboard();
      } else {
        const err = document.getElementById('loginError');
        err.innerText = response.message;
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.innerText = "Login";
      }
    }).checkLogin(user, pass);
  }

  function loadDashboard() {
    google.script.run.withSuccessHandler(function(html) {
      document.getElementById('app').innerHTML = html;
      
      // Update info user di header
      document.getElementById('userInfo').innerText = `Hello, ${currentUser.name} (${currentUser.role})`;
      
      // Tampilkan menu admin jika role adalah ADMIN
      if (currentUser.role === 'ADMIN') {
        document.getElementById('adminMenu').classList.remove('hidden');
      }
      
      // Load halaman default
      loadPage('UserPage');
    }).include('Dashboard');
  }

  function loadPage(pageName) {
    document.getElementById('mainContent').innerHTML = "<p>Loading content...</p>";
    document.getElementById('pageTitle').innerText = pageName;

    google.script.run.withSuccessHandler(function(htmlContent) {
      document.getElementById('mainContent').innerHTML = htmlContent;
    }).getPageContent(pageName, currentUser.role);
  }

  function logout() {
    currentUser = null;
    showLogin();
  }
</script>
  </body>
</html>
